spring:
  application:
    name: custoking-ims-vx
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    # Least-privilege application role. RLS is currently disabled (V117); isolation is
    # enforced at the service layer. In prod, provision ims_app with SELECT/INSERT/UPDATE/DELETE only.
    username: ${SPRING_DATASOURCE_USERNAME:ims_app}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: CustokingHikari
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    # Flyway needs DDL rights (CREATE TABLE etc.) that ims_app does not have.
    # Point it at a superuser connection separate from the application connection.
    # In prod, set FLYWAY_USERNAME / FLYWAY_PASSWORD to the DBA/superuser credentials.
    url: ${FLYWAY_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}}
    user: ${FLYWAY_USERNAME:postgres}
    password: ${FLYWAY_PASSWORD:${SPRING_DATASOURCE_PASSWORD:root}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"

app:
  bootstrap-users: ${APP_BOOTSTRAP_USERS:true}
  # No default values for secrets — ApplicationSecurityValidator enforces presence and strength.
  # Set APP_AADHAR_SECRET (≥16 chars) and APP_JWT_SECRET (≥32 chars) before starting.
  aadhar-secret: ${APP_AADHAR_SECRET:}
  jwt-secret: ${APP_JWT_SECRET:}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:4173,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:4173}
  jwt-expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  # Set to true in production (HTTPS) so the refresh-token cookie carries the Secure flag.
  cookie-secure: ${APP_COOKIE_SECURE:false}

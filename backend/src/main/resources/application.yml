spring:
  application:
    name: custoking-ims-vx
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  lifecycle:
    timeout-per-shutdown-phase: 20s
server:
  port: ${PORT:8080}
  shutdown: graceful
app:
  bootstrap-users: ${APP_BOOTSTRAP_USERS:true}
  aadhar-secret: ${APP_AADHAR_SECRET:CustokingAadhar!}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:4173,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:4173}
  jwt-secret: ${APP_JWT_SECRET:CustokingJwtSecretKeyForHS256MustBeAtLeast32Bytes!!}
  jwt-expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

spring:
  application:
    name: custoking-ims-vx
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  lifecycle:
    timeout-per-shutdown-phase: 20s
server:
  port: ${PORT:8080}
  shutdown: graceful
app:
  bootstrap-users: ${APP_BOOTSTRAP_USERS:true}
  aadhar-secret: ${APP_AADHAR_SECRET:CustokingAadhar!}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:4173,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:4173}

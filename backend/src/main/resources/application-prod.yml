spring:
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  datasource:
    # Tenant isolation is enforced at the application layer (TenantScopeService +
    # scoped user_role_assignments). PostgreSQL RLS is currently disabled (see V117).
    username: ${SPRING_DATASOURCE_USERNAME:ims_app}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: 1
  flyway:
    # Flyway runs migrations with DDL rights via a separate superuser connection.
    # FLYWAY_USERNAME and FLYWAY_PASSWORD must be set in prod secrets (Cloud Run).
    url: ${FLYWAY_URL:${SPRING_DATASOURCE_URL}}
    user: ${FLYWAY_USERNAME}
    password: ${FLYWAY_PASSWORD}

server:
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto

management:
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,prometheus,info

# Swagger/OpenAPI: disabled by default in production.
# Set SWAGGER_ENABLED=true only for controlled internal access (requires valid JWT).
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

logging:
  level:
    root: WARN
    com.custoking: INFO
    org.flywaydb: INFO

app:
  bootstrap-users: ${APP_BOOTSTRAP_USERS:false}
  cookie-secure: true

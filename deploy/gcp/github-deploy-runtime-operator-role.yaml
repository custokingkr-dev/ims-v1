title: GitHub Deploy Runtime Operator
description: Minimal runtime permissions for the GitHub deployment workflow to inspect Cloud Run services, run smoke jobs, and read smoke job output.
stage: GA
includedPermissions:
  - iam.serviceAccounts.get
  - logging.logEntries.list
  - resourcemanager.projects.get
  - run.executions.get
  - run.executions.list
  - run.jobs.create
  - run.jobs.get
  - run.jobs.list
  - run.jobs.run
  - run.jobs.update
  - run.operations.get
  - run.operations.list
  - run.services.get
  - run.services.list
  - run.tasks.get
  - run.tasks.list
  - secretmanager.secrets.get
  - secretmanager.secrets.list
  - secretmanager.versions.get

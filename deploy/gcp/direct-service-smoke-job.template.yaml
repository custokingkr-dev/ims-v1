apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: ims-direct-service-smoke
  labels:
    app.kubernetes.io/name: custoking
    app.kubernetes.io/component: production-smoke
spec:
  template:
    spec:
      taskCount: 1
      template:
        spec:
          serviceAccountName: __DIRECT_SMOKE_SERVICE_ACCOUNT__
          maxRetries: 0
          timeoutSeconds: 300
          containers:
            - image: python:3.12-slim
              command:
                - python
              args:
                - -c
                - |
                  import json
                  import os
                  import urllib.error
                  import urllib.request

                  def required_env(name):
                      value = os.environ[name].strip()
                      if not value:
                          raise RuntimeError(f"{name} is empty")
                      return value

                  CATALOG_URL = required_env("CATALOG_URL").rstrip("/")
                  TENANT_URL = required_env("TENANT_URL").rstrip("/")
                  SCHOOL_ID = os.environ.get("SMOKE_SCHOOL_ID", "").strip()
                  CATALOG_TOKEN = required_env("CATALOG_TOKEN")
                  TENANT_TOKEN = required_env("TENANT_TOKEN")
                  META = "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/identity?audience={}&format=full"

                  def request(url, headers=None, method="GET", body=None):
                      data = None if body is None else json.dumps(body).encode()
                      merged_headers = {} if headers is None else dict(headers)
                      if body is not None:
                          merged_headers["Content-Type"] = "application/json"
                      req = urllib.request.Request(url, data=data, headers=merged_headers, method=method)
                      try:
                          with urllib.request.urlopen(req, timeout=30) as response:
                              return response.status, response.read().decode()
                      except urllib.error.HTTPError as exc:
                          payload = exc.read().decode(errors="replace")
                          raise RuntimeError(f"{method} {url} failed with HTTP {exc.code}: {payload[:1000]}") from exc

                  def identity_token(audience):
                      status, token = request(META.format(audience), {"Metadata-Flavor": "Google"})
                      if status != 200 or not token:
                          raise RuntimeError("identity token missing")
                      return token.strip()

                  # Direct calls bypass the gateway, so they must inject the authenticated
                  # context the gateway normally supplies (post-Phase-1 TenantContext requires
                  # it; without it the service scopes to no tenant and returns 403). This is a
                  # trusted internal smoke (IAM + service token), acting as SUPERADMIN.
                  auth_ctx = {
                      "X-Authenticated-User-Id": "0",
                      "X-Authenticated-Email": "direct-service-smoke@custoking.local",
                      "X-Authenticated-Role": "SUPERADMIN",
                  }
                  catalog_headers = {
                      "Authorization": "Bearer " + identity_token(CATALOG_URL),
                      "X-Catalog-Service-Token": CATALOG_TOKEN,
                      **auth_ctx,
                  }
                  tenant_headers = {
                      "Authorization": "Bearer " + identity_token(TENANT_URL),
                      "X-Tenant-School-Token": TENANT_TOKEN,
                      **auth_ctx,
                  }

                  if not SCHOOL_ID:
                      status, payload = request(f"{TENANT_URL}/api/v1/schools", tenant_headers)
                      schools = json.loads(payload)
                      if not schools:
                          raise RuntimeError("no school available for direct service smoke")
                      SCHOOL_ID = str(schools[0]["id"])

                  status, payload = request(f"{CATALOG_URL}/api/v1/catalog/annual-plan?schoolId={SCHOOL_ID}", catalog_headers)
                  print("catalog annual-plan", status, payload[:500])

                  status, payload = request(
                      f"{TENANT_URL}/api/v1/schools/{SCHOOL_ID}/modules/REPORTS",
                      tenant_headers,
                      "PUT",
                      {"enabled": True, "plan": "DIRECT", "notes": "direct service smoke"},
                  )
                  print("tenant module upsert", status, payload[:500])

                  status, payload = request(
                      f"{TENANT_URL}/api/v1/schools/{SCHOOL_ID}/modules/REPORTS",
                      tenant_headers,
                      "DELETE",
                  )
                  print("tenant module delete", status, payload[:500])
              env:
                - name: CATALOG_URL
                  value: "__CATALOG_URL__"
                - name: TENANT_URL
                  value: "__TENANT_URL__"
                - name: SMOKE_SCHOOL_ID
                  value: "__SMOKE_SCHOOL_ID__"
                - name: CATALOG_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: __CATALOG_TOKEN_SECRET__
                      key: latest
                - name: TENANT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: __TENANT_TOKEN_SECRET__
                      key: latest

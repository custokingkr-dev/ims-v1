server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;
  client_max_body_size 8m;

  location /api/v1/ {
    # Resolve the upstream lazily (per-request) via a variable + resolver, rather than at
    # startup: on a first deploy the gateway may not exist yet, and a static proxy_pass would
    # fail nginx startup ("host not found in upstream"). This keeps nginx booting regardless;
    # requests 502 until the real gateway URL is wired in, then recover automatically.
    resolver 8.8.8.8 8.8.4.4 valid=30s;
    set $api_upstream ${API_UPSTREAM};
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: custoking-operations-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: ${DB_POOL_MIN:0}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
      data-source-properties:
        currentSchema: ${OPERATIONS_DB_SCHEMA:workflow,firefighting}
  flyway:
    enabled: false

flyway:
  url: ${FLYWAY_URL:${spring.datasource.url}}
  user: ${FLYWAY_USERNAME:${spring.datasource.username}}
  password: ${FLYWAY_PASSWORD:${spring.datasource.password}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
      probes:
        enabled: true

workflow:
  read-token: ${WORKFLOW_READ_TOKEN:}
  db:
    schema: ${WORKFLOW_DB_SCHEMA:workflow}

firefighting:
  read-token: ${FIREFIGHTING_READ_TOKEN:}
  db:
    schema: ${FIREFIGHTING_DB_SCHEMA:firefighting}

operations:
  outbox:
    db:
      schema: ${OPERATIONS_OUTBOX_DB_SCHEMA:firefighting}
    relay:
      batch-size: ${OPERATIONS_OUTBOX_RELAY_BATCH_SIZE:100}
      fixed-delay-ms: ${OPERATIONS_OUTBOX_RELAY_FIXED_DELAY_MS:10000}
      initial-delay-ms: ${OPERATIONS_OUTBOX_RELAY_INITIAL_DELAY_MS:0}
    pubsub:
      # topic-id is intentionally NOT given a default here (not even an empty
      # string): @ConditionalOnProperty(name = "operations.outbox.pubsub.topic-id")
      # on PubSubDomainEventPublisher must see this property as ABSENT unless
      # the topic is actually configured, so LoggingDomainEventPublisher stays
      # the default locally/in tests. Spring's relaxed env-var binding exposes
      # env var OPERATIONS_OUTBOX_PUBSUB_TOPIC_ID as operations.outbox.pubsub.topic-id
      # (NOTE the _ID suffix: env OPERATIONS_OUTBOX_PUBSUB_TOPIC would bind to the
      # DIFFERENT property operations.outbox.pubsub.topic and NOT satisfy the
      # condition — that mismatch silently leaves the no-op publisher active).
      # Adding an entry here with a `:` default would make the property "present"
      # (empty string) and wrongly satisfy the condition, so we omit it.
      project-id: ${OPERATIONS_OUTBOX_PUBSUB_PROJECT_ID:${GOOGLE_CLOUD_PROJECT:${GCP_PROJECT:}}}

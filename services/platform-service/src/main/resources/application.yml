server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: custoking-platform-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: ${DB_POOL_MIN:0}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
      data-source-properties:
        currentSchema: ${PLATFORM_DB_SCHEMA:reporting,notification,audit}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false

flyway:
  url: ${FLYWAY_URL:${spring.datasource.url}}
  user: ${FLYWAY_USERNAME:${spring.datasource.username}}
  password: ${FLYWAY_PASSWORD:${spring.datasource.password}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:}}
  otlp:
    # spring-boot-starter-opentelemetry transitively pulls in
    # io.micrometer:micrometer-registry-otlp, which auto-enables an OTLP
    # *metrics* exporter (pushing to a http://localhost:4318 default) as soon
    # as it is on the classpath. This task only asked for tracing; explicitly
    # disable the metrics exporter here so it stays opt-in via env var,
    # keeping behavior scoped and avoiding unrequested background network
    # calls to a collector that (by default) doesn't exist.
    metrics:
      export:
        enabled: ${OTEL_METRICS_EXPORT_ENABLED:false}

reporting:
  read-token: ${REPORTING_READ_TOKEN:}
  pubsub:
    push-token: ${REPORTING_PUBSUB_PUSH_TOKEN:${REPORTING_READ_TOKEN:}}
  event-projection:
    enabled: ${REPORTING_EVENT_PROJECTION_ENABLED:true}
    fixed-delay-ms: ${REPORTING_EVENT_PROJECTION_FIXED_DELAY_MS:10000}
    batch-size: ${REPORTING_EVENT_PROJECTION_BATCH_SIZE:50}
  db:
    schema: ${REPORTING_DB_SCHEMA:reporting}

notification:
  pubsub:
    push-token: ${NOTIFICATION_PUBSUB_PUSH_TOKEN:}
  status:
    token: ${NOTIFICATION_STATUS_TOKEN:}
  delivery:
    provider: ${NOTIFICATION_DELIVERY_PROVIDER:logging}
  msg91:
    dry-run: ${MSG91_DRY_RUN:true}
    auth-key: ${MSG91_AUTH_KEY:}
    timeout: ${MSG91_TIMEOUT:10s}
    sms-endpoint: ${MSG91_SMS_ENDPOINT:https://control.msg91.com/api/v5/flow}
    otp-endpoint: ${MSG91_OTP_ENDPOINT:https://control.msg91.com/api/v5/otp}
    email-endpoint: ${MSG91_EMAIL_ENDPOINT:https://control.msg91.com/api/v5/email/send}
    whatsapp-template-endpoint: ${MSG91_WHATSAPP_TEMPLATE_ENDPOINT:https://control.msg91.com/api/v5/whatsapp/whatsapp-outbound-message/bulk/}
    sms-flow-id: ${MSG91_SMS_FLOW_ID:}
    otp-template-id: ${MSG91_OTP_TEMPLATE_ID:}
    email-from-name: ${MSG91_EMAIL_FROM_NAME:}
    email-from-address: ${MSG91_EMAIL_FROM_ADDRESS:}
    email-domain: ${MSG91_EMAIL_DOMAIN:}
    whatsapp-integrated-number: ${MSG91_WHATSAPP_INTEGRATED_NUMBER:}
    whatsapp-language-code: ${MSG91_WHATSAPP_LANGUAGE_CODE:en}
  inbox:
    retry:
      enabled: ${NOTIFICATION_INBOX_RETRY_ENABLED:true}
      batch-size: ${NOTIFICATION_INBOX_RETRY_BATCH_SIZE:25}
      fixed-delay-ms: ${NOTIFICATION_INBOX_RETRY_FIXED_DELAY_MS:30000}

audit:
  ingest-token: ${AUDIT_INGEST_TOKEN:}

school-core:
  base-url: ${SCHOOL_CORE_URL:}
  connect-timeout-ms: ${SCHOOL_CORE_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${SCHOOL_CORE_READ_TIMEOUT_MS:5000}

operations:
  base-url: ${OPERATIONS_URL:}
  connect-timeout-ms: ${OPERATIONS_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${OPERATIONS_READ_TIMEOUT_MS:5000}

catalog:
  read-token: ${CATALOG_READ_TOKEN:}

firefighting:
  read-token: ${FIREFIGHTING_READ_TOKEN:}

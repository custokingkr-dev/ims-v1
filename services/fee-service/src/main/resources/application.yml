server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: custoking-fee-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  flyway:
    enabled: true
    url: ${FLYWAY_URL:${spring.datasource.url}}
    user: ${FLYWAY_USERNAME:${spring.datasource.username}}
    password: ${FLYWAY_PASSWORD:${spring.datasource.password}}
    schemas: ${FEE_DB_SCHEMA:fee}
    default-schema: ${FEE_DB_SCHEMA:fee}
    table: flyway_schema_history

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
      probes:
        enabled: true

fee:
  read-token: ${FEE_READ_TOKEN:}
  db:
    schema: ${FEE_DB_SCHEMA:fee}

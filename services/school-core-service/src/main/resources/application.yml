server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: custoking-school-core-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: ${DB_POOL_MIN:0}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
      data-source-properties:
        currentSchema: ${SCHOOLCORE_DB_SCHEMA:tenant_school,student,attendance,fee,catalog}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: ${STUDENT_PHOTO_MAX_FILE_SIZE:2MB}
      max-request-size: ${STUDENT_PHOTO_MAX_FILE_SIZE:2MB}

flyway:
  url: ${FLYWAY_URL:${spring.datasource.url}}
  user: ${FLYWAY_USERNAME:${spring.datasource.username}}
  password: ${FLYWAY_PASSWORD:${spring.datasource.password}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
      probes:
        enabled: true

tenant-school:
  read-token: ${TENANT_SCHOOL_READ_TOKEN:}

student:
  read-token: ${STUDENT_READ_TOKEN:}
  db:
    schema: ${STUDENT_DB_SCHEMA:student}
  photo:
    # Private GCS bucket for student photos; empty locally/in tests (feature degrades gracefully).
    bucket: ${STUDENT_PHOTO_BUCKET:}
    signed-url-ttl-minutes: ${STUDENT_PHOTO_SIGNED_URL_TTL_MINUTES:60}
    dimension: ${STUDENT_PHOTO_DIMENSION:512}
    max-bytes: ${STUDENT_PHOTO_MAX_BYTES:2097152}
    # Runtime SA to sign V4 URLs via IAM; blank -> resolved from the metadata server on Cloud Run.
    signer-sa: ${STUDENT_PHOTO_SIGNER_SA:}

attendance:
  read-token: ${ATTENDANCE_READ_TOKEN:}
  db:
    schema: ${ATTENDANCE_DB_SCHEMA:attendance}

fee:
  read-token: ${FEE_READ_TOKEN:}
  db:
    schema: ${FEE_DB_SCHEMA:fee}

catalog:
  read-token: ${CATALOG_READ_TOKEN:}
  db:
    schema: ${CATALOG_DB_SCHEMA:catalog}

school-core:
  db:
    schema: ${SCHOOL_CORE_DB_SCHEMA:tenant_school}
  outbox:
    relay:
      batch-size: ${SCHOOL_CORE_OUTBOX_RELAY_BATCH_SIZE:100}
      fixed-delay-ms: ${SCHOOL_CORE_OUTBOX_RELAY_FIXED_DELAY_MS:10000}
      initial-delay-ms: ${SCHOOL_CORE_OUTBOX_RELAY_INITIAL_DELAY_MS:0}
    pubsub:
      # topic-id is intentionally NOT given a default here (not even an empty
      # string): @ConditionalOnProperty(name = "school-core.outbox.pubsub.topic-id")
      # on PubSubDomainEventPublisher must see this property as ABSENT unless
      # the topic is actually configured, so LoggingDomainEventPublisher stays
      # the default locally/in tests. Spring's relaxed env-var binding exposes
      # env var SCHOOL_CORE_OUTBOX_PUBSUB_TOPIC_ID as school-core.outbox.pubsub.topic-id
      # (NOTE the _ID suffix: env SCHOOL_CORE_OUTBOX_PUBSUB_TOPIC would bind to the
      # DIFFERENT property school-core.outbox.pubsub.topic and NOT satisfy the
      # condition — that mismatch silently leaves the no-op publisher active).
      # Adding an entry here with a `:` default would make the property "present"
      # (empty string) and wrongly satisfy the condition, so we omit it.
      project-id: ${SCHOOL_CORE_OUTBOX_PUBSUB_PROJECT_ID:${GOOGLE_CLOUD_PROJECT:${GCP_PROJECT:}}}

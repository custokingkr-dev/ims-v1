server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: custoking-billing-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: ${DB_POOL_MIN:0}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
      data-source-properties:
        currentSchema: ${BILLING_DB_SCHEMA:billing}
  flyway:
    enabled: ${BILLING_FLYWAY_ENABLED:true}
    url: ${FLYWAY_URL:${spring.datasource.url}}
    user: ${FLYWAY_USERNAME:${spring.datasource.username}}
    password: ${FLYWAY_PASSWORD:${spring.datasource.password}}
    schemas: ${BILLING_DB_SCHEMA:billing}
    default-schema: ${BILLING_DB_SCHEMA:billing}
    table: flyway_schema_history

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}}
  otlp:
    # spring-boot-starter-opentelemetry transitively pulls in
    # io.micrometer:micrometer-registry-otlp, which auto-enables an OTLP
    # *metrics* exporter (pushing to a http://localhost:4318 default) as soon
    # as it is on the classpath. This task only asked for tracing; explicitly
    # disable the metrics exporter here so it stays opt-in via env var,
    # keeping behavior scoped and avoiding unrequested background network
    # calls to a collector that (by default) doesn't exist.
    metrics:
      export:
        enabled: ${OTEL_METRICS_EXPORT_ENABLED:false}

billing:
  service-token: ${BILLING_SERVICE_TOKEN:}
  db:
    schema: ${BILLING_DB_SCHEMA:billing}
  outbox:
    pubsub:
      # topic-id is intentionally NOT given a default here (not even an empty
      # string): @ConditionalOnProperty(name = "billing.outbox.pubsub.topic-id")
      # on PubSubDomainEventPublisher must see this property as ABSENT unless
      # the topic is actually configured, so LoggingDomainEventPublisher stays
      # the default locally/in tests. Spring's relaxed env-var binding exposes
      # env var BILLING_OUTBOX_PUBSUB_TOPIC_ID as billing.outbox.pubsub.topic-id
      # (NOTE the _ID suffix: env BILLING_OUTBOX_PUBSUB_TOPIC would bind to the
      # DIFFERENT property billing.outbox.pubsub.topic and NOT satisfy the
      # condition — that mismatch silently leaves the no-op publisher active).
      # Adding an entry here with a `:` default would make the property "present"
      # (empty string) and wrongly satisfy the condition, so we omit it.
      project-id: ${BILLING_OUTBOX_PUBSUB_PROJECT_ID:${GOOGLE_CLOUD_PROJECT:${GCP_PROJECT:}}}

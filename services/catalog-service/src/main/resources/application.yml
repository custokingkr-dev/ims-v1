server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: custoking-catalog-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  flyway:
    enabled: true
    url: ${FLYWAY_URL:${spring.datasource.url}}
    user: ${FLYWAY_USERNAME:${spring.datasource.username}}
    password: ${FLYWAY_PASSWORD:${spring.datasource.password}}
    schemas: ${CATALOG_DB_SCHEMA:catalog}
    default-schema: ${CATALOG_DB_SCHEMA:catalog}
    table: flyway_schema_history

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
      probes:
        enabled: true

catalog:
  read-token: ${CATALOG_READ_TOKEN:}
  db:
    schema: ${CATALOG_DB_SCHEMA:catalog}

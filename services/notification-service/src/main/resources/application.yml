server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: custoking-notification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: ${DB_POOL_MIN:1}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${NOTIFICATION_DB_SCHEMA:notification}
    open-in-view: false
  flyway:
    enabled: true
    url: ${FLYWAY_URL:${spring.datasource.url}}
    user: ${FLYWAY_USERNAME:${spring.datasource.username}}
    password: ${FLYWAY_PASSWORD:${spring.datasource.password}}
    schemas: ${NOTIFICATION_DB_SCHEMA:notification}
    default-schema: ${NOTIFICATION_DB_SCHEMA:notification}
    table: flyway_schema_history

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}
      probes:
        enabled: true

notification:
  pubsub:
    push-token: ${NOTIFICATION_PUBSUB_PUSH_TOKEN:}
  status:
    token: ${NOTIFICATION_STATUS_TOKEN:}
  delivery:
    provider: ${NOTIFICATION_DELIVERY_PROVIDER:logging}
  msg91:
    dry-run: ${MSG91_DRY_RUN:true}
    auth-key: ${MSG91_AUTH_KEY:}
    timeout: ${MSG91_TIMEOUT:10s}
    sms-endpoint: ${MSG91_SMS_ENDPOINT:https://control.msg91.com/api/v5/flow}
    otp-endpoint: ${MSG91_OTP_ENDPOINT:https://control.msg91.com/api/v5/otp}
    email-endpoint: ${MSG91_EMAIL_ENDPOINT:https://control.msg91.com/api/v5/email/send}
    whatsapp-template-endpoint: ${MSG91_WHATSAPP_TEMPLATE_ENDPOINT:https://control.msg91.com/api/v5/whatsapp/whatsapp-outbound-message/bulk/}
    sms-flow-id: ${MSG91_SMS_FLOW_ID:}
    otp-template-id: ${MSG91_OTP_TEMPLATE_ID:}
    email-from-name: ${MSG91_EMAIL_FROM_NAME:}
    email-from-address: ${MSG91_EMAIL_FROM_ADDRESS:}
    email-domain: ${MSG91_EMAIL_DOMAIN:}
    whatsapp-integrated-number: ${MSG91_WHATSAPP_INTEGRATED_NUMBER:}
    whatsapp-language-code: ${MSG91_WHATSAPP_LANGUAGE_CODE:en}
  inbox:
    retry:
      enabled: ${NOTIFICATION_INBOX_RETRY_ENABLED:true}
      batch-size: ${NOTIFICATION_INBOX_RETRY_BATCH_SIZE:25}
      fixed-delay-ms: ${NOTIFICATION_INBOX_RETRY_FIXED_DELAY_MS:30000}

name: GCP / Deploy Custom

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment to deploy."
        required: true
        type: string
      commit_sha:
        description: "Image tag to deploy. Defaults to the workflow commit SHA."
        required: false
        type: string
      deploy_services:
        description: "Service to build/deploy. Use all for the previous full rollout."
        required: true
        type: string
      run_direct_smoke:
        description: "Run private Cloud Run direct service smoke after all/API/domain deploys."
        required: true
        type: boolean
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment to deploy."
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      commit_sha:
        description: "Image tag to deploy. Defaults to the workflow commit SHA."
        required: false
        type: string
      deploy_services:
        description: "Service to build/deploy. Use all for the previous full rollout."
        required: true
        default: "frontend"
        type: choice
        options:
          - frontend
          - api-gateway
          - identity-service
          - tenant-school-service
          - student-service
          - attendance-service
          - fee-service
          - catalog-service
          - operations-service
          - platform-service
          - billing-service
          - all
      run_direct_smoke:
        description: "Run private Cloud Run direct service smoke after all/API/domain deploys."
        required: true
        default: true
        type: boolean

concurrency:
  group: gcp-deploy-${{ inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: custoking-ims
  GCP_REGION: asia-south2
  WORKLOAD_IDENTITY_PROVIDER: projects/755376288593/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOY_SERVICE_ACCOUNT: github-actions-sa@custoking-ims.iam.gserviceaccount.com
  DIRECT_SMOKE_SERVICE_ACCOUNT: direct-service-smoke@custoking-ims.iam.gserviceaccount.com
  CLOUD_BUILD_SOURCE_STAGING_DIR: gs://custoking-ims-github-deploy-source/source

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve deploy tag
        id: tag
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.commit_sha }}
        run: |
          if [[ -n "${REQUESTED_TAG}" ]]; then
            echo "value=${REQUESTED_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit build and deploy via Cloud Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deployment-evidence

          gcloud config set project "${GCP_PROJECT_ID}"
          BUILD_ID="$(gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=_COMMIT_SHA=${{ steps.tag.outputs.value }},_REGION=${GCP_REGION},_DEPLOY_SERVICES=${{ inputs.deploy_services || 'frontend' }} \
            --project="${GCP_PROJECT_ID}" \
            --gcs-source-staging-dir="${CLOUD_BUILD_SOURCE_STAGING_DIR}" \
            --async \
            --format='value(id)' \
            .)"

          echo "Cloud Build submitted: ${BUILD_ID}"
          echo "CLOUD_BUILD_ID=${BUILD_ID}" >> "${GITHUB_ENV}"
          printf '%s\n' "${BUILD_ID}" > deployment-evidence/cloud-build-id.txt
          for attempt in {1..120}; do
            STATUS="$(gcloud builds describe "${BUILD_ID}" \
              --project="${GCP_PROJECT_ID}" \
              --format='value(status)')"
            echo "Cloud Build ${BUILD_ID} status=${STATUS}"
            gcloud builds describe "${BUILD_ID}" \
              --project="${GCP_PROJECT_ID}" \
              --format=json > deployment-evidence/cloud-build.json
            case "${STATUS}" in
              SUCCESS)
                exit 0
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                exit 1
                ;;
            esac
            sleep 30
          done

          echo "Cloud Build ${BUILD_ID} did not finish within workflow polling window."
          exit 1

      - name: Run direct service smoke
        if: ${{ inputs.run_direct_smoke != false && inputs.deploy_services != 'frontend' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deployment-evidence

          if ! gcloud iam service-accounts describe "${DIRECT_SMOKE_SERVICE_ACCOUNT}" \
            --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            echo "Direct smoke service account is missing: ${DIRECT_SMOKE_SERVICE_ACCOUNT}" >&2
            echo "Run scripts/ensure-direct-service-smoke-identity.ps1 before deployment." >&2
            exit 1
          fi

          CATALOG_URL="$(gcloud run services describe custoking-catalog-service \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format='value(status.url)')"
          TENANT_URL="$(gcloud run services describe custoking-tenant-school-service \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format='value(status.url)')"
          export CATALOG_URL TENANT_URL

          python - <<'PY'
          import os
          from pathlib import Path

          template = Path("deploy/gcp/direct-service-smoke-job.template.yaml").read_text()
          values = {
              "__DIRECT_SMOKE_SERVICE_ACCOUNT__": os.environ["DIRECT_SMOKE_SERVICE_ACCOUNT"],
              "__CATALOG_URL__": os.environ["CATALOG_URL"],
              "__TENANT_URL__": os.environ["TENANT_URL"],
              "__SMOKE_SCHOOL_ID__": os.environ.get("SMOKE_SCHOOL_ID", "4"),
          }
          for key, value in values.items():
              template = template.replace(key, value.replace("\\", "\\\\").replace('"', '\\"'))
          Path("direct-service-smoke-job.generated.yaml").write_text(template)
          PY

          gcloud run jobs replace direct-service-smoke-job.generated.yaml \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" | tee deployment-evidence/direct-smoke-job-replace.log
          gcloud run jobs execute ims-direct-service-smoke \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --wait | tee deployment-evidence/direct-smoke-execution.log

          cp direct-service-smoke-job.generated.yaml deployment-evidence/direct-service-smoke-job.generated.yaml
          gcloud run jobs describe ims-direct-service-smoke \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format=json > deployment-evidence/direct-service-smoke-job.json

      - name: Print Cloud Run URLs
        if: always()
        shell: bash
        run: |
          mkdir -p deployment-evidence
          gcloud run services list \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format="table(metadata.name,status.url,status.latestReadyRevisionName)" \
            | tee deployment-evidence/cloud-run-services.txt
          gcloud run services list \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format=json > deployment-evidence/cloud-run-services.json

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gcp-deployment-evidence-${{ github.run_id }}
          path: deployment-evidence/
          if-no-files-found: warn

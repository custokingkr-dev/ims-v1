name: GCP / Deploy

# Reusable, environment-parameterized deploy engine. Builds once (or reuses an image
# on promotion) and deploys env-suffixed Cloud Run services in the single `custoking`
# project. Project identity comes from GitHub *variables* (Settings > Variables) so the
# same workflow serves any project; per-environment DB config comes from the GitHub
# Environment's variables (dev vs prod). Prod is gated by the `prod` Environment's
# protection rules (required reviewers).
on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (GitHub Environment name): dev | prod."
        required: true
        type: string
      commit_sha:
        description: "Image tag to build/deploy. Defaults to the workflow commit SHA."
        required: false
        type: string
      deploy_services:
        description: "Comma list of services, or 'all'."
        required: true
        type: string
      run_direct_smoke:
        description: "Run the private Cloud Run direct-service smoke after deploy."
        required: true
        type: boolean
      run_gateway_smoke:
        description: "Run the deployed whole-application gateway smoke after deploy."
        required: false
        default: false
        type: boolean
      skip_build:
        description: "Promotion: reuse the image already built for the same SHA (build-once-promote)."
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment."
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      commit_sha:
        description: "Image tag to build/deploy. Defaults to the workflow commit SHA."
        required: false
        type: string
      deploy_services:
        description: "Service to build/deploy. Use 'all' for a full rollout."
        required: true
        default: "all"
        type: choice
        options:
          - all
          - frontend
          - api-gateway
          - identity-service
          - school-core-service
          - operations-service
          - platform-service
          - billing-service
      run_direct_smoke:
        description: "Run private Cloud Run direct service smoke after deploy."
        required: true
        default: true
        type: boolean
      run_gateway_smoke:
        description: "Run the deployed whole-application gateway smoke after deploy."
        required: true
        default: true
        type: boolean
      skip_build:
        description: "Promotion: reuse the image already built for the same SHA."
        required: false
        default: false
        type: boolean

concurrency:
  # Serialize per environment so two deploys to the same env never race.
  group: gcp-deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  # Project identity — set these as repository Variables (Settings > Secrets and variables > Actions > Variables).
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOY_SERVICE_ACCOUNT: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}
  DIRECT_SMOKE_SERVICE_ACCOUNT: ${{ vars.DIRECT_SMOKE_SERVICE_ACCOUNT }}
  CLOUD_BUILD_SOURCE_STAGING_DIR: ${{ vars.CLOUD_BUILD_SOURCE_STAGING_DIR }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Binds to the GitHub Environment of the same name; the `prod` Environment's protection
    # rules (required reviewers) gate this job automatically.
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve deploy tag
        id: tag
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.commit_sha }}
        run: |
          if [[ -n "${REQUESTED_TAG}" ]]; then
            echo "value=${REQUESTED_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit build and deploy via Cloud Build
        shell: bash
        env:
          # Per-environment DB target: set DB_HOST / DB_NAME on each GitHub Environment
          # (dev -> custoking-db-dev private IP / custoking_dev; prod -> the prod instance).
          ENV_NAME: ${{ inputs.environment }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_NAME: ${{ vars.DB_NAME }}
          SKIP_BUILD: ${{ inputs.skip_build }}
        run: |
          set -euo pipefail
          mkdir -p deployment-evidence

          : "${GCP_PROJECT_ID:?set the GCP_PROJECT_ID repo variable}"
          : "${DB_HOST:?set DB_HOST on the '${ENV_NAME}' GitHub Environment}"
          : "${DB_NAME:?set DB_NAME on the '${ENV_NAME}' GitHub Environment}"

          if [[ "${ENV_NAME}" == "prod" ]]; then
            OTEL_SAMPLE="0.2"
          else
            OTEL_SAMPLE="1.0"
          fi

          gcloud config set project "${GCP_PROJECT_ID}"
          BUILD_ID="$(gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=_ENV=${ENV_NAME},_SKIP_BUILD=${SKIP_BUILD},_COMMIT_SHA=${{ steps.tag.outputs.value }},_REGION=${GCP_REGION},_DB_HOST=${DB_HOST},_DB_NAME=${DB_NAME},_DEPLOY_SERVICES=${{ inputs.deploy_services }},_OTEL_SAMPLE=${OTEL_SAMPLE} \
            --project="${GCP_PROJECT_ID}" \
            --gcs-source-staging-dir="${CLOUD_BUILD_SOURCE_STAGING_DIR}" \
            --async \
            --format='value(id)' \
            .)"

          echo "Cloud Build submitted: ${BUILD_ID} (env=${ENV_NAME}, skip_build=${SKIP_BUILD})"
          printf '%s\n' "${BUILD_ID}" > deployment-evidence/cloud-build-id.txt
          for attempt in {1..120}; do
            STATUS="$(gcloud builds describe "${BUILD_ID}" --project="${GCP_PROJECT_ID}" --format='value(status)')"
            echo "Cloud Build ${BUILD_ID} status=${STATUS}"
            gcloud builds describe "${BUILD_ID}" --project="${GCP_PROJECT_ID}" --format=json > deployment-evidence/cloud-build.json
            case "${STATUS}" in
              SUCCESS) exit 0 ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED) exit 1 ;;
            esac
            sleep 30
          done
          echo "Cloud Build ${BUILD_ID} did not finish within workflow polling window."
          exit 1

      - name: Run direct service smoke
        if: ${{ inputs.run_direct_smoke != false && inputs.deploy_services != 'frontend' }}
        shell: bash
        env:
          ENV_NAME: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          mkdir -p deployment-evidence

          if ! gcloud iam service-accounts describe "${DIRECT_SMOKE_SERVICE_ACCOUNT}" \
            --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            echo "Direct smoke service account is missing: ${DIRECT_SMOKE_SERVICE_ACCOUNT}" >&2
            echo "Run scripts/ensure-direct-service-smoke-identity.ps1 before deployment." >&2
            exit 1
          fi

          # catalog + tenant-school domains live in school-core-service (env-suffixed).
          CATALOG_URL="$(gcloud run services describe "custoking-school-core-service-${ENV_NAME}" \
            --project="${GCP_PROJECT_ID}" --region="${GCP_REGION}" --format='value(status.url)')"
          TENANT_URL="${CATALOG_URL}"
          export CATALOG_URL TENANT_URL

          python - <<'PY'
          import os
          from pathlib import Path
          template = Path("deploy/gcp/direct-service-smoke-job.template.yaml").read_text()
          values = {
              "__DIRECT_SMOKE_SERVICE_ACCOUNT__": os.environ["DIRECT_SMOKE_SERVICE_ACCOUNT"],
              "__CATALOG_URL__": os.environ["CATALOG_URL"],
              "__TENANT_URL__": os.environ["TENANT_URL"],
              "__SMOKE_SCHOOL_ID__": os.environ.get("SMOKE_SCHOOL_ID", ""),
              "__CATALOG_TOKEN_SECRET__": f"catalog-read-token-{os.environ['ENV_NAME']}",
              "__TENANT_TOKEN_SECRET__": f"tenant-school-read-token-{os.environ['ENV_NAME']}",
          }
          for key, value in values.items():
              template = template.replace(key, value.replace("\\", "\\\\").replace('"', '\\"'))
          Path("direct-service-smoke-job.generated.yaml").write_text(template)
          PY

          gcloud run jobs replace direct-service-smoke-job.generated.yaml \
            --project="${GCP_PROJECT_ID}" --region="${GCP_REGION}" | tee deployment-evidence/direct-smoke-job-replace.log
          gcloud run jobs execute ims-direct-service-smoke \
            --project="${GCP_PROJECT_ID}" --region="${GCP_REGION}" --wait | tee deployment-evidence/direct-smoke-execution.log

      - name: Run deployed gateway smoke
        if: ${{ inputs.run_gateway_smoke == true && inputs.deploy_services != 'frontend' }}
        shell: bash
        env:
          ENV_NAME: ${{ inputs.environment }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_NAME: ${{ vars.DB_NAME }}
        run: |
          set -euo pipefail
          : "${DB_HOST:?set DB_HOST on the '${ENV_NAME}' GitHub Environment}"
          : "${DB_NAME:?set DB_NAME on the '${ENV_NAME}' GitHub Environment}"
          DB_HOST_ONLY="${DB_HOST%%:*}"
          DB_PORT="5432"
          if [[ "${DB_HOST}" == *":"* ]]; then
            DB_PORT="${DB_HOST##*:}"
          fi
          URL="$(gcloud run services describe "custoking-api-gateway-${ENV_NAME}" \
            --project="${GCP_PROJECT_ID}" --region="${GCP_REGION}" --format='value(status.url)')"
          echo "gateway_url=${URL}"
          pwsh ./scripts/invoke-production-gateway-smoke.ps1 \
            -Project "${GCP_PROJECT_ID}" \
            -Region "${GCP_REGION}" \
            -GatewayBaseUrl "${URL}" \
            -HostAddress "${DB_HOST_ONLY}" \
            -Port "${DB_PORT}" \
            -Database "${DB_NAME}" \
            -PasswordSecret "db-password-${ENV_NAME}" \
            -Gcloud "gcloud"

      - name: Print Cloud Run URLs
        if: always()
        shell: bash
        run: |
          mkdir -p deployment-evidence
          gcloud run services list \
            --project="${GCP_PROJECT_ID}" --region="${GCP_REGION}" \
            --format="table(metadata.name,status.url,status.latestReadyRevisionName)" \
            | tee deployment-evidence/cloud-run-services.txt

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gcp-deployment-evidence-${{ inputs.environment }}-${{ github.run_id }}
          path: deployment-evidence/
          if-no-files-found: warn

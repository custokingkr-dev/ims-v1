name: Security / Container Scan

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service image to scan."
        required: true
        default: "api-gateway"
        type: choice
        options:
          - api-gateway
          - frontend
          - identity-service
          - school-core-service
          - operations-service
          - platform-service
          - billing-service
  schedule:
    - cron: "0 21 * * 0"

# Least privilege: the GITHUB_TOKEN handed to the third-party trivy-action only
# needs to authenticate read API calls (raise the rate limit / pull the vuln DB).
# Pin to read-only so a compromised action cannot use the token to write.
permissions:
  contents: read

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      context: ${{ steps.target.outputs.context }}
      image: ${{ steps.target.outputs.image }}
      build_args: ${{ steps.target.outputs.build_args }}
    steps:
      - name: Resolve service image target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          service="${{ inputs.service || 'api-gateway' }}"
          case "$service" in
            frontend)
              echo "context=./frontend" >> "$GITHUB_OUTPUT"
              echo "image=custoking-frontend" >> "$GITHUB_OUTPUT"
              echo "build_args=VITE_API_BASE_URL=/api/v1" >> "$GITHUB_OUTPUT"
              ;;
            api-gateway)
              echo "context=./services/api-gateway" >> "$GITHUB_OUTPUT"
              echo "image=custoking-api-gateway" >> "$GITHUB_OUTPUT"
              echo "build_args=" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "context=./services/${service}" >> "$GITHUB_OUTPUT"
              echo "image=custoking-${service}" >> "$GITHUB_OUTPUT"
              echo "build_args=" >> "$GITHUB_OUTPUT"
              ;;
          esac

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [ resolve-target ]
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        shell: bash
        env:
          BUILD_CONTEXT: ${{ needs.resolve-target.outputs.context }}
          BUILD_ARGS: ${{ needs.resolve-target.outputs.build_args }}
          IMAGE_TAG: ${{ needs.resolve-target.outputs.image }}:scan
        run: |
          set -euo pipefail
          args=()
          if [[ -n "${BUILD_ARGS}" ]]; then
            while IFS= read -r arg; do
              [[ -n "${arg}" ]] && args+=(--build-arg "${arg}")
            done <<< "${BUILD_ARGS}"
          fi

          for attempt in 1 2 3; do
            if docker build "${args[@]}" -t "${IMAGE_TAG}" "${BUILD_CONTEXT}"; then
              exit 0
            fi
            echo "docker build failed on attempt ${attempt}; retrying..."
            sleep $((attempt * 10))
          done
          docker build "${args[@]}" -t "${IMAGE_TAG}" "${BUILD_CONTEXT}"

      - name: Trivy scan image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/.cache/trivy"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${GITHUB_WORKSPACE}/.cache/trivy:/root/.cache/" \
            ghcr.io/aquasecurity/trivy:0.63.0 image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL \
            "${{ needs.resolve-target.outputs.image }}:scan"

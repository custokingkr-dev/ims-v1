name: GCP / Deploy Tenant School Service

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment to deploy."
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      commit_sha:
        description: "Image tag to deploy. Defaults to the workflow commit SHA."
        required: false
        type: string
      run_direct_smoke:
        description: "Run private Cloud Run direct service smoke after deployment."
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ inputs.environment }}
      commit_sha: ${{ inputs.commit_sha }}
      deploy_services: tenant-school-service
      run_direct_smoke: ${{ inputs.run_direct_smoke }}


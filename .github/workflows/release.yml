name: CD / Deploy main to dev

# Delivery model:
#   1. Pushes to main build images tagged with the commit SHA and deploy them to DEV only.
#   2. Manual dispatch can still run build-once-promote: deploy DEV, then promote the SAME
#      image SHA to PROD (no rebuild). The prod job binds to the `prod` GitHub Environment,
#      whose protection rules hold the promotion until a human approves it.
#
# Manual re-runs / single-service deploys still use the `GCP / Deploy` workflow directly
# (workflow_dispatch).

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_services:
        description: "Services to roll out (comma list or 'all')."
        required: true
        default: "all"
        type: string

permissions:
  contents: read
  id-token: write

# Concurrency is scoped PER JOB, not per workflow, on purpose. A single shared group would let a
# promote-prod job that is parked at the prod reviewer gate (it can wait for hours as an
# in-progress job) hold the group and starve every later push's dev deploy — GitHub keeps only the
# newest pending run per group and cancels the rest. Splitting the groups keeps the two lanes
# independent: dev always converges to the latest merged SHA, and a waiting prod approval never
# cancels a dev deploy.
jobs:
  deploy-dev:
    name: Build + deploy DEV
    # Serialize dev deploys; a burst of merges cancels only the older *pending* runs, so dev
    # converges to the newest SHA. cancel-in-progress:false so an in-flight deploy is never
    # interrupted mid-rollout (avoids a half-deployed dev).
    concurrency:
      group: cd-dev
      cancel-in-progress: false
    # Skip cleanly until the GCP project is bootstrapped (the GCP_PROJECT_ID repo
    # Variable is set). Prevents failing deploy runs on every push to main pre-setup.
    if: ${{ vars.GCP_PROJECT_ID != '' }}
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      commit_sha: ${{ github.sha }}
      deploy_services: ${{ github.event.inputs.deploy_services || 'all' }}
      run_direct_smoke: true
      run_gateway_smoke: true
      skip_build: false
    secrets: inherit

  promote-prod:
    name: Promote same image to PROD (gated)
    needs: deploy-dev
    # Its own group so the prod approval gate never blocks dev. cancel-in-progress:true so a newer
    # merge supersedes a promotion still parked at the reviewer gate — the gate always reflects the
    # latest dev-validated SHA instead of holding a stale one.
    concurrency:
      group: cd-prod
      cancel-in-progress: true
    if: ${{ github.event_name == 'workflow_dispatch' && vars.GCP_PROJECT_ID != '' }}
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      commit_sha: ${{ github.sha }}   # exact image validated in dev — no rebuild
      deploy_services: ${{ github.event.inputs.deploy_services || 'all' }}
      run_direct_smoke: true
      run_gateway_smoke: true
      skip_build: true                # build-once-promote: reuse dev's image
    secrets: inherit

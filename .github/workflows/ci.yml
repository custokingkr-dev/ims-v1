name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:
  schedule:
    - cron: "30 20 * * *"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      has_service_changes: ${{ steps.targets.outputs.has_service_changes }}
      service_matrix: ${{ steps.targets.outputs.service_matrix }}
      docker_matrix: ${{ steps.targets.outputs.docker_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve affected CI targets
        id: targets
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            git fetch origin "${{ github.base_ref }}" --depth=1
            $baseRef = "origin/${{ github.base_ref }}"
          } elseif ("${{ github.event.before }}" -and "${{ github.event.before }}" -ne "0000000000000000000000000000000000000000") {
            $baseRef = "${{ github.event.before }}"
          } else {
            $baseRef = "HEAD~1"
          }

          $result = ./scripts/resolve-affected-ci-targets.ps1 -BaseRef $baseRef -HeadRef HEAD | ConvertFrom-Json
          "has_service_changes=$($result.has_service_changes.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "service_matrix=$($result.service_matrix | ConvertTo-Json -Depth 10 -Compress)" >> $env:GITHUB_OUTPUT
          "docker_matrix=$($result.docker_matrix | ConvertTo-Json -Depth 10 -Compress)" >> $env:GITHUB_OUTPUT

          "Changed files:"
          $result.changed_files | ForEach-Object { " - $_" }
          "Affected services:"
          $result.service_matrix.include | ForEach-Object { " - $($_.name)" }

  service-test:
    runs-on: ubuntu-latest
    needs: [ detect-changes ]
    if: needs.detect-changes.outputs.has_service_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.service_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: matrix.tool == 'maven'
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        if: matrix.tool == 'npm'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-node@v4
        if: matrix.tool == 'node'
        with:
          node-version: 20

      - name: Install frontend dependencies
        if: matrix.tool == 'npm'
        working-directory: ${{ matrix.path }}
        run: npm ci --include=dev

      - name: Install Node service dependencies
        if: matrix.tool == 'node'
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci --include=dev
          fi

      - name: Audit frontend dependencies
        if: matrix.tool == 'npm'
        working-directory: ${{ matrix.path }}
        run: npm audit --audit-level=critical

      - name: Test ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        shell: bash
        run: |
          if [ "${{ matrix.tool }}" = "maven" ]; then
            mvn -B test --no-transfer-progress
          elif [ "${{ matrix.tool }}" = "node" ]; then
            node --test server.test.js
          else
            npm test
            npm run build
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: [ detect-changes, service-test ]
    if: needs.detect-changes.outputs.has_service_changes == 'true' && needs.service-test.result == 'success'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.docker_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          build-args: ${{ matrix.build_args }}
          push: false
          load: true
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan ${{ matrix.name }} for CRITICAL CVEs
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ matrix.image }}:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          vuln-type: os,library

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Start split-service stack
        shell: bash
        run: |
          set -euo pipefail

          wait_healthy() {
            local service="$1"
            local container="$2"
            for attempt in {1..60}; do
              status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || true)"
              if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                echo "$service is $status"
                return 0
              fi
              sleep 5
            done
            docker compose logs --tail=200 "$service"
            return 1
          }

          docker compose up -d postgres
          wait_healthy postgres custoking-postgres
          docker compose up -d identity-service school-core-service operations-service platform-service billing-service frontend api-gateway
          wait_healthy identity-service custoking-identity-service
          wait_healthy school-core-service custoking-school-core-service
          wait_healthy operations-service custoking-operations-service
          wait_healthy platform-service custoking-platform-service
          wait_healthy billing-service custoking-billing-service
          wait_healthy frontend custoking-frontend
          wait_healthy api-gateway custoking-api-gateway

      - name: Enable enforce mode + provision app_rt/seed (required once RLS is enabled)
        shell: pwsh
        run: |
          # Post-RLS (Phase 1) the stack requires GATEWAY_AUTH_MODE=enforce: the gateway must
          # introspect the JWT and inject X-Authenticated-School-Id, or RLS returns 0 rows for
          # every school-scoped query. Recreate the gateway with the enforce overlay, then grant
          # app_rt schema access and seed the two-tenant fixture (idempotent). All subsequent
          # smokes + the BOLA gate then run against the real (enforce) configuration.
          docker compose -f docker-compose.yml -f docker-compose.bola.yml up -d --force-recreate api-gateway
          if ($LASTEXITCODE -ne 0) { Write-Error "gateway enforce-mode recreate failed"; exit $LASTEXITCODE }
          ./scripts/ensure-app-rt-local.ps1
          ./scripts/ensure-local-dev-users.ps1

      - name: Verify migration boundaries
        shell: pwsh
        run: ./scripts/verify-microservice-migration.ps1 -RunDbAudit

      - name: Smoke gateway routes (enforce)
        shell: pwsh
        run: ./scripts/smoke-gateway-routes.ps1

      - name: Smoke frontend-compatible microservice features (enforce)
        shell: pwsh
        run: ./scripts/smoke-microservice-features.ps1 -GatewayBaseUrl http://localhost -PostgresContainer custoking-postgres -Database postgres -DbUser postgres -TimeoutSeconds 30

      - name: BOLA tenant-isolation gate
        shell: pwsh
        run: ./scripts/audit-tenant-isolation.ps1

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --tail=300

  ci-result:
    runs-on: ubuntu-latest
    needs: [ detect-changes, service-test, docker-build, secret-scan, integration ]
    if: always()
    steps:
      - name: Check CI result
        shell: bash
        run: |
          set -euo pipefail
          echo "service-test=${{ needs.service-test.result }}"
          echo "docker-build=${{ needs.docker-build.result }}"
          echo "secret-scan=${{ needs.secret-scan.result }}"
          echo "integration=${{ needs.integration.result }}"

          for result in "${{ needs.detect-changes.result }}" "${{ needs.secret-scan.result }}"; do
            if [ "$result" != "success" ]; then
              exit 1
            fi
          done

          for result in "${{ needs.service-test.result }}" "${{ needs.docker-build.result }}" "${{ needs.integration.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              exit 1
            fi
          done

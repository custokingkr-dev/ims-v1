name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - architecture-hardening-local-dev

jobs:
  backend:
    name: Backend verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Maven verify
        run: mvn -B -Pci verify

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=critical
      - name: Build
        run: npm run build

  deployment-config:
    name: GCP deployment config check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify GitHub and Cloud Build deployment config
        run: |
          test -f .github/workflows/deploy.yml
          test -f cloudbuild.yaml
          test -f deploy/gcp/README.md
          grep -q "gcloud builds submit" .github/workflows/deploy.yml
          ! grep -q -- "--async" .github/workflows/deploy.yml
          grep -q "VITE_API_BASE_URL=.*api/v1" cloudbuild.yaml
          grep -q "gcloud" cloudbuild.yaml
          grep -q "run" cloudbuild.yaml
          grep -q "APP_COOKIE_SAME_SITE=None" cloudbuild.yaml
          grep -q "APP_JWT_SECRET=jwt-secret:latest" cloudbuild.yaml
          grep -q "APP_AADHAR_SECRET=aadhar-secret:latest" cloudbuild.yaml

  containers:
    name: Compose and image build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - deployment-config
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config
      - name: Build backend image
        run: docker build ./backend
      - name: Build frontend image
        run: docker build ./frontend --build-arg VITE_API_BASE_URL=/api/v1

name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:

  # ── Backend: unit + integration tests + coverage ─────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # Testcontainers spins up its own PostgreSQL; no external service needed.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Run tests with JaCoCo coverage
        run: mvn -B verify -Pci

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: warn

  # ── DB migration smoke test ────────────────────────────────────────────────
  db-migration-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ims_migrationtest
          POSTGRES_USER: migrator
          POSTGRES_PASSWORD: migrator
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Run Flyway migrations on fresh DB
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ims_migrationtest
          SPRING_DATASOURCE_USERNAME: migrator
          SPRING_DATASOURCE_PASSWORD: migrator
          FLYWAY_URL: jdbc:postgresql://localhost:5432/ims_migrationtest
          FLYWAY_USERNAME: migrator
          FLYWAY_PASSWORD: migrator
        run: |
          mvn -B flyway:migrate \
            -Dflyway.url="jdbc:postgresql://localhost:5432/ims_migrationtest" \
            -Dflyway.user=migrator \
            -Dflyway.password=migrator \
            --no-transfer-progress
          echo "All Flyway migrations applied successfully."

  # ── Frontend: type-check + build ──────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --include=dev

      - name: Audit frontend dependencies (fail on critical)
        run: npm audit --audit-level=critical

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  # ── OWASP dependency vulnerability scan ──────────────────────────────────
  owasp-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Run on push to main/master only (expensive, ~5 min); skip on every PR.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: owasp-nvd-${{ runner.os }}-

      - name: OWASP dependency-check (fail on CVSS >= 9)
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=.owasp-suppressions.xml \
            --no-transfer-progress

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: backend/target/dependency-check-report.html
          if-no-files-found: ignore

  # ── Secret scanning with Gitleaks ─────────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for Gitleaks

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker build smoke test (no push) ─────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [ backend-test, frontend-build ]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: custoking-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          build-args: |
            VITE_API_BASE_URL=/api/v1
          push: false
          tags: custoking-frontend:ci

  # ── Trivy image vulnerability scan (after Docker build) ───────────────────
  trivy-scan:
    runs-on: ubuntu-latest
    needs: [ docker-build ]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: custoking-backend:scan

      - name: Trivy scan backend image (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.31.0   # pinned — update to latest tag on dep-bump PRs
        with:
          image-ref: custoking-backend:scan
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

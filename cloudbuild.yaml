substitutions:
  _REGION: asia-south2
  _AR_REPO: custoking
  _COMMIT_SHA: latest
  _DEPLOY_SERVICES: frontend
  _DB_HOST: 10.116.0.3:5432
  _DB_NAME: custoking_ims_v1
  _APP_DB_USER: appuser
  _FLYWAY_DB_USER: appuser
  _VPC_NETWORK: default
  _VPC_SUBNET: default
  _VPC_EGRESS: all-traffic
  _FRONTEND_SERVICE: custoking-frontend
  _API_GATEWAY_SERVICE: custoking-api-gateway

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-and-push-selected-images
    entrypoint: bash
    args:
      - -ceu
      - |
        services=(
          "identity-service:services/identity-service:custoking-identity-service"
          "tenant-school-service:services/tenant-school-service:custoking-tenant-school-service"
          "student-service:services/student-service:custoking-student-service"
          "attendance-service:services/attendance-service:custoking-attendance-service"
          "fee-service:services/fee-service:custoking-fee-service"
          "catalog-service:services/catalog-service:custoking-catalog-service"
          "workflow-service:services/workflow-service:custoking-workflow-service"
          "firefighting-service:services/firefighting-service:custoking-firefighting-service"
          "reporting-service:services/reporting-service:custoking-reporting-service"
          "billing-service:services/billing-service:custoking-billing-service"
          "audit-service:services/audit-service:custoking-audit-service"
          "notification-service:services/notification-service:custoking-notification-service"
          "frontend:frontend:custoking-frontend"
          "api-gateway:services/api-gateway:custoking-api-gateway"
        )

        selected() {
          local service="$1"
          local image="$2"
          if [ "${_DEPLOY_SERVICES}" = "all" ]; then
            return 0
          fi
          IFS=',' read -ra requested <<< "${_DEPLOY_SERVICES}"
          for target in "$${requested[@]}"; do
            target="$${target//[[:space:]]/}"
            if [ "$${target}" = "$${service}" ] || [ "$${target}" = "$${image}" ]; then
              return 0
            fi
          done
          return 1
        }

        built_any=false
        for item in "$${services[@]}"; do
          IFS=: read -r name context image <<< "$${item}"
          if ! selected "$${name}" "$${image}"; then
            echo "Skipping $${name}; not selected by _DEPLOY_SERVICES=${_DEPLOY_SERVICES}"
            continue
          fi
          built_any=true
          docker build -t "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/$${image}:${_COMMIT_SHA}" "$${context}"
          docker push "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/$${image}:${_COMMIT_SHA}"
        done

        if [ "$${built_any}" != "true" ]; then
          echo "No services matched _DEPLOY_SERVICES=${_DEPLOY_SERVICES}" >&2
          exit 1
        fi

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-selected-domain-services
    entrypoint: bash
    args:
      - -ceu
      - |
        selected() {
          local service="$1"
          local image="$2"
          if [ "${_DEPLOY_SERVICES}" = "all" ]; then
            return 0
          fi
          IFS=',' read -ra requested <<< "${_DEPLOY_SERVICES}"
          for target in "$${requested[@]}"; do
            target="$${target//[[:space:]]/}"
            if [ "$${target}" = "$${service}" ] || [ "$${target}" = "$${image}" ]; then
              return 0
            fi
          done
          return 1
        }

        common_env="SPRING_PROFILES_ACTIVE=prod,SPRING_DATASOURCE_URL=jdbc:postgresql://${_DB_HOST}/${_DB_NAME},SPRING_DATASOURCE_USERNAME=${_APP_DB_USER},FLYWAY_URL=jdbc:postgresql://${_DB_HOST}/${_DB_NAME},FLYWAY_USERNAME=${_FLYWAY_DB_USER},SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=5,SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=0"
        common_flags=(--region="${_REGION}" --platform=managed --network="${_VPC_NETWORK}" --subnet="${_VPC_SUBNET}" --vpc-egress="${_VPC_EGRESS}" --no-allow-unauthenticated --port=8080 --max-instances=2 --memory=768Mi)

        deploy_service() {
          local selector="$1"
          local service="$2"
          local image="$3"
          local env="$4"
          local secrets="$5"
          if ! selected "$${selector}" "$${image}"; then
            echo "Skipping $${selector}; not selected by _DEPLOY_SERVICES=${_DEPLOY_SERVICES}"
            return 0
          fi
          gcloud run deploy "$${service}" \
            --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/$${image}:${_COMMIT_SHA}" \
            "$${common_flags[@]}" \
            --set-env-vars="$${common_env},$${env}" \
            --set-secrets="$${secrets}"
        }

        deploy_service tenant-school-service custoking-tenant-school-service custoking-tenant-school-service "TENANT_SCHOOL_DB_SCHEMA=tenant_school" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,TENANT_SCHOOL_READ_TOKEN=tenant-school-read-token:latest"
        TENANT_SCHOOL_URL="$(gcloud run services describe custoking-tenant-school-service --region="${_REGION}" --format='value(status.url)' 2>/dev/null || true)"
        if [ -z "$${TENANT_SCHOOL_URL}" ]; then
          TENANT_SCHOOL_URL="http://tenant-school-service:8080"
        fi
        deploy_service identity-service custoking-identity-service custoking-identity-service "IDENTITY_DB_SCHEMA=identity,TENANT_SCHOOL_BASE_URL=$${TENANT_SCHOOL_URL},TENANT_SCHOOL_CLOUD_RUN_AUTH=auto,APP_COOKIE_SECURE=true,APP_COOKIE_SAME_SITE=None,APP_JWT_EXPIRATION_MS=900000,APP_REFRESH_TOKEN_EXPIRATION_MS=604800000" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,APP_JWT_SECRET=jwt-secret:latest,IDENTITY_INTROSPECTION_TOKEN=identity-introspection-token:latest,TENANT_SCHOOL_READ_TOKEN=tenant-school-read-token:latest"
        deploy_service student-service custoking-student-service custoking-student-service "STUDENT_DB_SCHEMA=student" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,STUDENT_READ_TOKEN=student-read-token:latest"
        deploy_service attendance-service custoking-attendance-service custoking-attendance-service "ATTENDANCE_DB_SCHEMA=attendance" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,ATTENDANCE_READ_TOKEN=attendance-read-token:latest"
        deploy_service fee-service custoking-fee-service custoking-fee-service "FEE_DB_SCHEMA=fee" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,FEE_READ_TOKEN=fee-read-token:latest"
        deploy_service catalog-service custoking-catalog-service custoking-catalog-service "CATALOG_DB_SCHEMA=catalog" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,CATALOG_READ_TOKEN=catalog-read-token:latest"
        deploy_service workflow-service custoking-workflow-service custoking-workflow-service "WORKFLOW_DB_SCHEMA=workflow" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,WORKFLOW_READ_TOKEN=workflow-read-token:latest"
        deploy_service firefighting-service custoking-firefighting-service custoking-firefighting-service "FIREFIGHTING_DB_SCHEMA=firefighting" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,FIREFIGHTING_READ_TOKEN=firefighting-read-token:latest"
        deploy_service reporting-service custoking-reporting-service custoking-reporting-service "REPORTING_DB_SCHEMA=reporting" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,REPORTING_READ_TOKEN=reporting-read-token:latest"
        deploy_service billing-service custoking-billing-service custoking-billing-service "BILLING_DB_SCHEMA=billing" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,BILLING_SERVICE_TOKEN=billing-service-token:latest"
        deploy_service audit-service custoking-audit-service custoking-audit-service "AUDIT_DB_SCHEMA=audit" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,AUDIT_INGEST_TOKEN=audit-ingest-token:latest"
        deploy_service notification-service custoking-notification-service custoking-notification-service "NOTIFICATION_DB_SCHEMA=notification,MSG91_DRY_RUN=true" \
          "SPRING_DATASOURCE_PASSWORD=db-password:latest,FLYWAY_PASSWORD=db-password:latest,NOTIFICATION_STATUS_TOKEN=notification-status-token:latest,MSG91_AUTH_KEY=msg91-auth-key:latest"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-selected-frontend-gateway
    entrypoint: bash
    args:
      - -ceu
      - |
        selected() {
          local service="$1"
          local image="$2"
          if [ "${_DEPLOY_SERVICES}" = "all" ]; then
            return 0
          fi
          IFS=',' read -ra requested <<< "${_DEPLOY_SERVICES}"
          for target in "$${requested[@]}"; do
            target="$${target//[[:space:]]/}"
            if [ "$${target}" = "$${service}" ] || [ "$${target}" = "$${image}" ]; then
              return 0
            fi
          done
          return 1
        }

        url() {
          gcloud run services describe "$1" --region="${_REGION}" --format='value(status.url)'
        }

        if selected frontend custoking-frontend; then
          CURRENT_GATEWAY_URL="$(gcloud run services describe "${_API_GATEWAY_SERVICE}" --region="${_REGION}" --format='value(status.url)' 2>/dev/null || true)"
          if [ -z "$${CURRENT_GATEWAY_URL}" ]; then
            CURRENT_GATEWAY_URL="http://api-gateway:80"
          fi
          gcloud run deploy "${_FRONTEND_SERVICE}" \
            --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/custoking-frontend:${_COMMIT_SHA}" \
            --region="${_REGION}" --platform=managed --allow-unauthenticated --port=80 --max-instances=2 \
            --set-env-vars="API_UPSTREAM=$${CURRENT_GATEWAY_URL}"
        else
          echo "Skipping frontend; not selected by _DEPLOY_SERVICES=${_DEPLOY_SERVICES}"
        fi

        if selected api-gateway custoking-api-gateway; then
          FRONTEND_URL="$(url "${_FRONTEND_SERVICE}")"
          IDENTITY_URL="$(url custoking-identity-service)"
          TENANT_URL="$(url custoking-tenant-school-service)"
          STUDENT_URL="$(url custoking-student-service)"
          ATTENDANCE_URL="$(url custoking-attendance-service)"
          FEE_URL="$(url custoking-fee-service)"
          CATALOG_URL="$(url custoking-catalog-service)"
          WORKFLOW_URL="$(url custoking-workflow-service)"
          FIREFIGHTING_URL="$(url custoking-firefighting-service)"
          REPORTING_URL="$(url custoking-reporting-service)"
          BILLING_URL="$(url custoking-billing-service)"
          AUDIT_URL="$(url custoking-audit-service)"
          NOTIFICATION_URL="$(url custoking-notification-service)"

          gcloud run deploy "${_API_GATEWAY_SERVICE}" \
            --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/custoking-api-gateway:${_COMMIT_SHA}" \
            --region="${_REGION}" --platform=managed --allow-unauthenticated --port=80 --max-instances=3 \
            --set-env-vars="GATEWAY_AUTH_MODE=enforce,GATEWAY_CLOUD_RUN_AUTH=auto,FRONTEND_UPSTREAM=$${FRONTEND_URL},IDENTITY_UPSTREAM=$${IDENTITY_URL},TENANT_SCHOOL_UPSTREAM=$${TENANT_URL},STUDENT_UPSTREAM=$${STUDENT_URL},ATTENDANCE_UPSTREAM=$${ATTENDANCE_URL},FEE_UPSTREAM=$${FEE_URL},CATALOG_UPSTREAM=$${CATALOG_URL},WORKFLOW_UPSTREAM=$${WORKFLOW_URL},FIREFIGHTING_UPSTREAM=$${FIREFIGHTING_URL},REPORTING_UPSTREAM=$${REPORTING_URL},BILLING_UPSTREAM=$${BILLING_URL},AUDIT_UPSTREAM=$${AUDIT_URL},NOTIFICATION_UPSTREAM=$${NOTIFICATION_URL}" \
            --set-secrets="IDENTITY_SERVICE_TOKEN=identity-introspection-token:latest,TENANT_SCHOOL_SERVICE_TOKEN=tenant-school-read-token:latest,STUDENT_SERVICE_TOKEN=student-read-token:latest,ATTENDANCE_SERVICE_TOKEN=attendance-read-token:latest,FEE_SERVICE_TOKEN=fee-read-token:latest,CATALOG_SERVICE_TOKEN=catalog-read-token:latest,WORKFLOW_SERVICE_TOKEN=workflow-read-token:latest,FIREFIGHTING_SERVICE_TOKEN=firefighting-read-token:latest,REPORTING_SERVICE_TOKEN=reporting-read-token:latest,BILLING_SERVICE_TOKEN=billing-service-token:latest,AUDIT_SERVICE_TOKEN=audit-ingest-token:latest,NOTIFICATION_SERVICE_TOKEN=notification-status-token:latest"

          GATEWAY_URL="$(url "${_API_GATEWAY_SERVICE}")"
          gcloud run services update "${_FRONTEND_SERVICE}" \
            --region="${_REGION}" \
            --set-env-vars="API_UPSTREAM=$${GATEWAY_URL}"
        else
          echo "Skipping api-gateway; not selected by _DEPLOY_SERVICES=${_DEPLOY_SERVICES}"
        fi

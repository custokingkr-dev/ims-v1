substitutions:
  _REGION: asia-south2
  _AR_REPO: custoking
  _COMMIT_SHA: latest
  _DEPLOY_SERVICES: frontend
  _DB_HOST: 10.116.0.3:5432
  _DB_NAME: custoking_ims_v1
  _APP_DB_USER: app_rt
  _FLYWAY_DB_USER: appuser
  _VPC_NETWORK: default
  _VPC_SUBNET: default
  _VPC_EGRESS: all-traffic
  _FRONTEND_SERVICE: custoking-frontend
  _API_GATEWAY_SERVICE: custoking-api-gateway

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-and-push-selected-images
    entrypoint: bash
    args:
      - -ceu
      - |
        services=(
          "identity-service:services/identity-service:custoking-identity-service"
          "school-core-service:services/school-core-service:custoking-school-core-service"
          "operations-service:services/operations-service:custoking-operations-service"
          "platform-service:services/platform-service:custoking-platform-service"
          "billing-service:services/billing-service:custoking-billing-service"
          "frontend:frontend:custoking-frontend"
          "api-gateway:services/api-gateway:custoking-api-gateway"
        )

        selected() {
          local service="$1"
          local image="$2"
          if [ "${_DEPLOY_SERVICES}" = "all" ]; then
            return 0
          fi
          IFS=',' read -ra requested <<< "${_DEPLOY_SERVICES}"
          for target in "$${requested[@]}"; do
            target="$${target//[[:space:]]/}"
            if [ "$${target}" = "$${service}" ] || [ "$${target}" = "$${image}" ]; then
              return 0
            fi
          done
          return 1
        }

        built_any=false
        for item in "$${services[@]}"; do
          IFS=: read -r name context image <<< "$${item}"
          if ! selected "$${name}" "$${image}"; then
            echo "Skipping $${name}; not selected by _DEPLOY_SERVICES=${_DEPLOY_SERVICES}"
            continue
          fi
          built_any=true
          docker build -t "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/$${image}:${_COMMIT_SHA}" "$${context}"
          docker push "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/$${image}:${_COMMIT_SHA}"
        done

        if [ "$${built_any}" != "true" ]; then
          echo "No services matched _DEPLOY_SERVICES=${_DEPLOY_SERVICES}" >&2
          exit 1
        fi

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-selected-domain-services
    entrypoint: bash
    args:
      - -ceu
      - |
        selected() {
          local service="$1"
          local image="$2"
          if [ "${_DEPLOY_SERVICES}" = "all" ]; then
            return 0
          fi
          IFS=',' read -ra requested <<< "${_DEPLOY_SERVICES}"
          for target in "$${requested[@]}"; do
            target="$${target//[[:space:]]/}"
            if [ "$${target}" = "$${service}" ] || [ "$${target}" = "$${image}" ]; then
              return 0
            fi
          done
          return 1
        }

        common_env="SPRING_PROFILES_ACTIVE=prod,SPRING_DATASOURCE_URL=jdbc:postgresql://${_DB_HOST}/${_DB_NAME},SPRING_DATASOURCE_USERNAME=${_APP_DB_USER},FLYWAY_URL=jdbc:postgresql://${_DB_HOST}/${_DB_NAME},FLYWAY_USERNAME=${_FLYWAY_DB_USER},SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=5,SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=0"
        common_flags=(--region="${_REGION}" --platform=managed --network="${_VPC_NETWORK}" --subnet="${_VPC_SUBNET}" --vpc-egress="${_VPC_EGRESS}" --no-allow-unauthenticated --port=8080 --max-instances=2 --memory=768Mi --cpu-boost)

        deploy_service() {
          local selector="$1"
          local service="$2"
          local image="$3"
          local env="$4"
          local secrets="$5"
          local extra_flags="$${6:-}"
          if ! selected "$${selector}" "$${image}"; then
            echo "Skipping $${selector}; not selected by _DEPLOY_SERVICES=${_DEPLOY_SERVICES}"
            return 0
          fi
          gcloud run deploy "$${service}" \
            --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/$${image}:${_COMMIT_SHA}" \
            "$${common_flags[@]}" \
            $${extra_flags} \
            --set-env-vars="$${common_env},$${env}" \
            --set-secrets="$${secrets}"
        }

        # school-core-service = tenant_school + student + attendance + fee + catalog (Phase 2 merge #3).
        # Owns all five schemas (SCHOOLCORE_DB_SCHEMA defaults in application.yml). Accepts all five tokens.
        deploy_service school-core-service custoking-school-core-service custoking-school-core-service "SCHOOL_CORE_MERGED=true" \
          "SPRING_DATASOURCE_PASSWORD=app-rt-password:latest,FLYWAY_PASSWORD=db-password:latest,TENANT_SCHOOL_READ_TOKEN=tenant-school-read-token:latest,STUDENT_READ_TOKEN=student-read-token:latest,ATTENDANCE_READ_TOKEN=attendance-read-token:latest,FEE_READ_TOKEN=fee-read-token:latest,CATALOG_READ_TOKEN=catalog-read-token:latest"
        # identity calls tenant-school directly; that domain now lives in school-core.
        TENANT_SCHOOL_URL="$(gcloud run services describe custoking-school-core-service --region="${_REGION}" --format='value(status.url)' 2>/dev/null || true)"
        if [ -z "$${TENANT_SCHOOL_URL}" ]; then
          TENANT_SCHOOL_URL="http://school-core-service:8080"
        fi
        deploy_service identity-service custoking-identity-service custoking-identity-service "IDENTITY_DB_SCHEMA=identity,TENANT_SCHOOL_BASE_URL=$${TENANT_SCHOOL_URL},TENANT_SCHOOL_CLOUD_RUN_AUTH=auto,APP_COOKIE_SECURE=true,APP_COOKIE_SAME_SITE=None,APP_JWT_EXPIRATION_MS=900000,APP_REFRESH_TOKEN_EXPIRATION_MS=604800000" \
          "SPRING_DATASOURCE_PASSWORD=app-rt-password:latest,FLYWAY_PASSWORD=db-password:latest,APP_JWT_SECRET=jwt-secret:latest,IDENTITY_INTROSPECTION_TOKEN=identity-introspection-token:latest,TENANT_SCHOOL_READ_TOKEN=tenant-school-read-token:latest" \
          "--min-instances=1"
        # operations-service = workflow + firefighting (Phase 2 merge). Owns both schemas
        # (OPERATIONS_DB_SCHEMA defaults to "workflow,firefighting" in application.yml — not set
        # here because a comma in a --set-env-vars value would be mis-parsed). Accepts both tokens.
        deploy_service operations-service custoking-operations-service custoking-operations-service "OPERATIONS_MERGED=true" \
          "SPRING_DATASOURCE_PASSWORD=app-rt-password:latest,FLYWAY_PASSWORD=db-password:latest,WORKFLOW_READ_TOKEN=workflow-read-token:latest,FIREFIGHTING_READ_TOKEN=firefighting-read-token:latest"
        # platform-service = reporting + notification + audit (Phase 2 merge #2). Owns all three
        # schemas (PLATFORM_DB_SCHEMA defaults to "reporting,notification,audit" in application.yml
        # to avoid a comma in --set-env-vars). Accepts all three domains' tokens; keeps MSG91.
        deploy_service platform-service custoking-platform-service custoking-platform-service "MSG91_DRY_RUN=true" \
          "SPRING_DATASOURCE_PASSWORD=app-rt-password:latest,FLYWAY_PASSWORD=db-password:latest,REPORTING_READ_TOKEN=reporting-read-token:latest,AUDIT_INGEST_TOKEN=audit-ingest-token:latest,NOTIFICATION_STATUS_TOKEN=notification-status-token:latest,MSG91_AUTH_KEY=msg91-auth-key:latest"
        deploy_service billing-service custoking-billing-service custoking-billing-service "BILLING_DB_SCHEMA=billing" \
          "SPRING_DATASOURCE_PASSWORD=app-rt-password:latest,FLYWAY_PASSWORD=db-password:latest,BILLING_SERVICE_TOKEN=billing-service-token:latest"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-selected-frontend-gateway
    entrypoint: bash
    args:
      - -ceu
      - |
        selected() {
          local service="$1"
          local image="$2"
          if [ "${_DEPLOY_SERVICES}" = "all" ]; then
            return 0
          fi
          IFS=',' read -ra requested <<< "${_DEPLOY_SERVICES}"
          for target in "$${requested[@]}"; do
            target="$${target//[[:space:]]/}"
            if [ "$${target}" = "$${service}" ] || [ "$${target}" = "$${image}" ]; then
              return 0
            fi
          done
          return 1
        }

        url() {
          gcloud run services describe "$1" --region="${_REGION}" --format='value(status.url)'
        }

        if selected frontend custoking-frontend; then
          CURRENT_GATEWAY_URL="$(gcloud run services describe "${_API_GATEWAY_SERVICE}" --region="${_REGION}" --format='value(status.url)' 2>/dev/null || true)"
          if [ -z "$${CURRENT_GATEWAY_URL}" ]; then
            CURRENT_GATEWAY_URL="http://api-gateway:80"
          fi
          gcloud run deploy "${_FRONTEND_SERVICE}" \
            --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/custoking-frontend:${_COMMIT_SHA}" \
            --region="${_REGION}" --platform=managed --allow-unauthenticated --port=80 --max-instances=2 --cpu-boost \
            --set-env-vars="API_UPSTREAM=$${CURRENT_GATEWAY_URL}"
        else
          echo "Skipping frontend; not selected by _DEPLOY_SERVICES=${_DEPLOY_SERVICES}"
        fi

        if selected api-gateway custoking-api-gateway; then
          FRONTEND_URL="$(url "${_FRONTEND_SERVICE}")"
          IDENTITY_URL="$(url custoking-identity-service)"
          SCHOOLCORE_URL="$(url custoking-school-core-service)"
          OPERATIONS_URL="$(url custoking-operations-service)"
          PLATFORM_URL="$(url custoking-platform-service)"
          BILLING_URL="$(url custoking-billing-service)"

          gcloud run deploy "${_API_GATEWAY_SERVICE}" \
            --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/custoking-api-gateway:${_COMMIT_SHA}" \
            --region="${_REGION}" --platform=managed --allow-unauthenticated --port=80 --max-instances=3 --cpu-boost --min-instances=1 \
            --set-env-vars="GATEWAY_AUTH_MODE=enforce,GATEWAY_CLOUD_RUN_AUTH=auto,GATEWAY_CORS_ALLOWED_ORIGINS=$${FRONTEND_URL},FRONTEND_UPSTREAM=$${FRONTEND_URL},IDENTITY_UPSTREAM=$${IDENTITY_URL},TENANT_SCHOOL_UPSTREAM=$${SCHOOLCORE_URL},STUDENT_UPSTREAM=$${SCHOOLCORE_URL},ATTENDANCE_UPSTREAM=$${SCHOOLCORE_URL},FEE_UPSTREAM=$${SCHOOLCORE_URL},CATALOG_UPSTREAM=$${SCHOOLCORE_URL},WORKFLOW_UPSTREAM=$${OPERATIONS_URL},FIREFIGHTING_UPSTREAM=$${OPERATIONS_URL},REPORTING_UPSTREAM=$${PLATFORM_URL},BILLING_UPSTREAM=$${BILLING_URL},AUDIT_UPSTREAM=$${PLATFORM_URL},NOTIFICATION_UPSTREAM=$${PLATFORM_URL},GATEWAY_LOCAL_JWT_VERIFY=enabled" \
            --set-secrets="IDENTITY_SERVICE_TOKEN=identity-introspection-token:latest,TENANT_SCHOOL_SERVICE_TOKEN=tenant-school-read-token:latest,STUDENT_SERVICE_TOKEN=student-read-token:latest,ATTENDANCE_SERVICE_TOKEN=attendance-read-token:latest,FEE_SERVICE_TOKEN=fee-read-token:latest,CATALOG_SERVICE_TOKEN=catalog-read-token:latest,WORKFLOW_SERVICE_TOKEN=workflow-read-token:latest,FIREFIGHTING_SERVICE_TOKEN=firefighting-read-token:latest,REPORTING_SERVICE_TOKEN=reporting-read-token:latest,BILLING_SERVICE_TOKEN=billing-service-token:latest,AUDIT_SERVICE_TOKEN=audit-ingest-token:latest,NOTIFICATION_SERVICE_TOKEN=notification-status-token:latest,APP_JWT_SECRET=jwt-secret:latest"

          GATEWAY_URL="$(url "${_API_GATEWAY_SERVICE}")"
          gcloud run services update "${_FRONTEND_SERVICE}" \
            --region="${_REGION}" \
            --set-env-vars="API_UPSTREAM=$${GATEWAY_URL}"
        else
          echo "Skipping api-gateway; not selected by _DEPLOY_SERVICES=${_DEPLOY_SERVICES}"
        fi

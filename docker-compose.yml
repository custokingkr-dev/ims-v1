services:
  postgres:
    image: postgres:16
    container_name: custoking-postgres
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 512m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/local/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 20

  identity-service:
    profiles: ["core", "full"]
    build:
      context: ./services/identity-service
    container_name: custoking-identity-service
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 384m
    environment:
      JAVA_OPTS: "-Xms128m -Xmx512m -XX:MaxMetaspaceSize=160m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: app_rt
      SPRING_DATASOURCE_PASSWORD: app_rt
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      FLYWAY_URL: jdbc:postgresql://postgres:5432/postgres
      FLYWAY_USERNAME: postgres
      FLYWAY_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
      APP_JWT_SECRET: "local-dev-jwt-secret-key-32-chars-minimum"
      APP_JWT_EXPIRATION_MS: "900000"
      APP_REFRESH_TOKEN_EXPIRATION_MS: "604800000"
      APP_COOKIE_SECURE: "false"
      APP_COOKIE_SAME_SITE: Strict
      IDENTITY_DB_SCHEMA: identity
      IDENTITY_INTROSPECTION_TOKEN: local-dev-identity-token
      TENANT_SCHOOL_BASE_URL: http://tenant-school-service:8080
      TENANT_SCHOOL_READ_TOKEN: local-dev-tenant-school-token
      TENANT_SCHOOL_CLOUD_RUN_AUTH: never
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy

  tenant-school-service:
    profiles: ["core", "full"]
    build:
      context: ./services/tenant-school-service
    container_name: custoking-tenant-school-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 320m
    environment:
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=144m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: app_rt
      SPRING_DATASOURCE_PASSWORD: app_rt
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      FLYWAY_URL: jdbc:postgresql://postgres:5432/postgres
      FLYWAY_USERNAME: postgres
      FLYWAY_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
      TENANT_SCHOOL_DB_SCHEMA: tenant_school
      TENANT_SCHOOL_READ_TOKEN: local-dev-tenant-school-token
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy

  student-service:
    profiles: ["core", "full"]
    build:
      context: ./services/student-service
    container_name: custoking-student-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 320m
    environment:
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=144m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: app_rt
      SPRING_DATASOURCE_PASSWORD: app_rt
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      FLYWAY_URL: jdbc:postgresql://postgres:5432/postgres
      FLYWAY_USERNAME: postgres
      FLYWAY_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
      STUDENT_DB_SCHEMA: student
      STUDENT_READ_TOKEN: local-dev-student-token
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy

  attendance-service:
    profiles: ["core", "full"]
    build:
      context: ./services/attendance-service
    container_name: custoking-attendance-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 320m
    environment:
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=144m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: app_rt
      SPRING_DATASOURCE_PASSWORD: app_rt
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      FLYWAY_URL: jdbc:postgresql://postgres:5432/postgres
      FLYWAY_USERNAME: postgres
      FLYWAY_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
      ATTENDANCE_DB_SCHEMA: attendance
      ATTENDANCE_READ_TOKEN: local-dev-attendance-token
    ports:
      - "8086:8080"
    depends_on:
      postgres:
        condition: service_healthy

  fee-service:
    profiles: ["core", "full"]
    build:
      context: ./services/fee-service
    container_name: custoking-fee-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 320m
    environment:
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=144m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: app_rt
      SPRING_DATASOURCE_PASSWORD: app_rt
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      FLYWAY_URL: jdbc:postgresql://postgres:5432/postgres
      FLYWAY_USERNAME: postgres
      FLYWAY_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
      FEE_DB_SCHEMA: fee
      FEE_READ_TOKEN: local-dev-fee-token
    ports:
      - "8087:8080"
    depends_on:
      postgres:
        condition: service_healthy

  catalog-service:
    profiles: ["full"]
    build:
      context: ./services/catalog-service
    container_name: custoking-catalog-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 320m
    environment:
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=144m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: app_rt
      SPRING_DATASOURCE_PASSWORD: app_rt
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      FLYWAY_URL: jdbc:postgresql://postgres:5432/postgres
      FLYWAY_USERNAME: postgres
      FLYWAY_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
      CATALOG_READ_TOKEN: local-dev-catalog-token
      CATALOG_DB_SCHEMA: catalog
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy

  operations-service:
    profiles: ["full"]
    build:
      context: ./services/operations-service
    container_name: custoking-operations-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 320m
    environment:
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=144m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: app_rt
      SPRING_DATASOURCE_PASSWORD: app_rt
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      FLYWAY_URL: jdbc:postgresql://postgres:5432/postgres
      FLYWAY_USERNAME: postgres
      FLYWAY_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
      OPERATIONS_DB_SCHEMA: "workflow,firefighting"
      WORKFLOW_READ_TOKEN: local-dev-workflow-token
      FIREFIGHTING_READ_TOKEN: local-dev-firefighting-token
    ports:
      - "8089:8080"
    depends_on:
      postgres:
        condition: service_healthy

  platform-service:
    profiles: ["full"]
    build:
      context: ./services/platform-service
    container_name: custoking-platform-service
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 384m
    environment:
      JAVA_OPTS: "-Xms128m -Xmx512m -XX:MaxMetaspaceSize=160m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: app_rt
      SPRING_DATASOURCE_PASSWORD: app_rt
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      FLYWAY_URL: jdbc:postgresql://postgres:5432/postgres
      FLYWAY_USERNAME: postgres
      FLYWAY_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
      PLATFORM_DB_SCHEMA: "reporting,notification,audit"
      REPORTING_READ_TOKEN: local-dev-reporting-token
      REPORTING_PUBSUB_PUSH_TOKEN: local-dev-reporting-token
      AUDIT_INGEST_TOKEN: local-dev-audit-ingest-token
      NOTIFICATION_DELIVERY_PROVIDER: msg91
      MSG91_DRY_RUN: "${MSG91_DRY_RUN:-true}"
      MSG91_AUTH_KEY: "${MSG91_AUTH_KEY:-}"
      MSG91_TIMEOUT: "${MSG91_TIMEOUT:-10s}"
      MSG91_EMAIL_DOMAIN: "${MSG91_EMAIL_DOMAIN:-custoking.com}"
      NOTIFICATION_INBOX_RETRY_ENABLED: "true"
      NOTIFICATION_INBOX_RETRY_FIXED_DELAY_MS: "5000"
      NOTIFICATION_PUBSUB_PUSH_TOKEN: local-dev-notification-token
      NOTIFICATION_STATUS_TOKEN: local-dev-notification-status-token
    ports:
      - "8091:8080"
    depends_on:
      postgres:
        condition: service_healthy

  billing-service:
    profiles: ["full"]
    build:
      context: ./services/billing-service
    container_name: custoking-billing-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 320m
    environment:
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=144m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: app_rt
      SPRING_DATASOURCE_PASSWORD: app_rt
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      FLYWAY_URL: jdbc:postgresql://postgres:5432/postgres
      FLYWAY_USERNAME: postgres
      FLYWAY_PASSWORD: root
      SPRING_PROFILES_ACTIVE: prod
      BILLING_DB_SCHEMA: billing
      BILLING_SERVICE_TOKEN: local-dev-billing-token
    ports:
      - "8092:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    profiles: ["core", "full"]
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: custoking-frontend
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 64m
    depends_on:
      - api-gateway

  api-gateway:
    profiles: ["core", "full"]
    build:
      context: ./services/api-gateway
    container_name: custoking-api-gateway
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 64m
    environment:
      NOTIFICATION_SERVICE_TOKEN: local-dev-notification-status-token
      AUDIT_SERVICE_TOKEN: local-dev-audit-ingest-token
      IDENTITY_SERVICE_TOKEN: local-dev-identity-token
      TENANT_SCHOOL_SERVICE_TOKEN: local-dev-tenant-school-token
      STUDENT_SERVICE_TOKEN: local-dev-student-token
      ATTENDANCE_SERVICE_TOKEN: local-dev-attendance-token
      FEE_SERVICE_TOKEN: local-dev-fee-token
      CATALOG_SERVICE_TOKEN: local-dev-catalog-token
      WORKFLOW_SERVICE_TOKEN: local-dev-workflow-token
      FIREFIGHTING_SERVICE_TOKEN: local-dev-firefighting-token
      # Phase 2: workflow + firefighting are served by the merged operations-service.
      WORKFLOW_UPSTREAM: http://operations-service:8080
      FIREFIGHTING_UPSTREAM: http://operations-service:8080
      # Phase 2: reporting + notification + audit are served by the merged platform-service.
      REPORTING_UPSTREAM: http://platform-service:8080
      NOTIFICATION_UPSTREAM: http://platform-service:8080
      AUDIT_UPSTREAM: http://platform-service:8080
      REPORTING_SERVICE_TOKEN: local-dev-reporting-token
      BILLING_SERVICE_TOKEN: local-dev-billing-token
      GATEWAY_AUTH_MODE: permissive
      GATEWAY_CLOUD_RUN_AUTH: never
    ports:
      - "80:80"

volumes:
  postgres_data:

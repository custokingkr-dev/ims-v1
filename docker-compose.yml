services:
  postgres:
    image: postgres:16
    container_name: custoking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: custoking-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      APP_CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:80
      APP_BOOTSTRAP_USERS: "true"
      SPRING_PROFILES_ACTIVE: dev
      # Local-only secrets for Tilt/docker compose. Do not reuse outside dev.
      APP_JWT_SECRET: "local-dev-jwt-secret-key-32-chars-minimum"
      APP_AADHAR_SECRET: "local-dev-aadhar-secret-16"
      APP_JWT_EXPIRATION_MS: "900000"
      APP_REFRESH_TOKEN_EXPIRATION_MS: "604800000"
      SUPERADMIN_PASSWORD: "LocalSuperadmin@2026!"
      DEMO_ADMIN_PASSWORD: "LocalDemoAdmin@2026!"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: custoking-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:

# Gitleaks configuration for Custoking IMS.
# Extends the built-in ruleset and suppresses false positives on documented
# placeholder/example files. Real secrets live only in gitignored .env files
# (local) or GCP Secret Manager / Cloud Run env vars (deployed) — never here.
# Docs: https://github.com/gitleaks/gitleaks#configuration
title = "Custoking IMS gitleaks config"

[extend]
# Keep all of gitleaks' default rules; only add the allowlist below.
useDefault = true

[allowlist]
description = "Allow placeholder values in committed example env files and a documented test-only secret file."
# Path regexes are matched against each file's path. Any *.env.example is a
# template containing documented placeholders (e.g. APP_AADHAR_SECRET=replace_with_16plus),
# not real credentials, so it should never be scanned for secrets.
# The refresh-rotation @SpringBootTest supplies an inline ≥32-char DUMMY JWT
# secret so the context boots (test-only, never production). Scope the
# allowlist narrowly to THAT one test file rather than a repo-wide value regex,
# so the scanner keeps full strength everywhere else.
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)services/identity-service/src/test/java/com/custoking/ims/identityservice/application/IdentityAuthServiceReuseCommitIntegrationTest\.java$''',
]
# Belt-and-suspenders: never treat obvious placeholder tokens as secrets,
# even if they appear outside the example files above.
# The last entry is the self-describing, test-only JWT secret used by the gateway
# local-JWT-verification tests (server.test.js, JwtServiceTest.java) and quoted in
# their plan doc. Allowlisting the exact literal keeps the scanner at full strength
# on the rest of those files (unlike a path allowlist).
# The integration-test JWT value is also a self-describing dummy used in Spring
# context tests; keep the exact literal allowlisted instead of suppressing paths.
# Local tool settings history contains command templates with tracked-variable
# placeholders, not real bearer tokens.
regexes = [
  '''replace_with[A-Za-z0-9_]*''',
  '''change_me[A-Za-z0-9_]*''',
  '''__TRACKED_VAR__''',
  '''test-jwt-secret-at-least-32-characters-long''',
  '''integration-test-jwt-secret-AAAABBBBCCCC1234''',
]
